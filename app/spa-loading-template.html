<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: radial-gradient(ellipse at center, #1e293b 0%, #0f172a 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
  }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .icon {
    animation: pulse 2s ease-in-out infinite;
  }

  .wordmark {
    font-size: 28px;
    font-weight: 700;
    color: #00DC82;
    letter-spacing: -0.5px;
  }

  .dots {
    display: flex;
    gap: 7px;
    margin-top: 28px;
  }

  .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #00DC82;
    opacity: 0.4;
    animation: bounce 1.4s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(0.93); opacity: 0.7; }
  }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }
</style>

<div class="brand">
  <svg class="icon" width="72" height="72" viewBox="0 0 24 24" fill="none"
       stroke="#00DC82" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="2" width="20" height="20" rx="2.18"/>
    <line x1="7" y1="2" x2="7" y2="22"/>
    <line x1="17" y1="2" x2="17" y2="22"/>
    <line x1="2" y1="12" x2="22" y2="12"/>
    <line x1="2" y1="7" x2="7" y2="7"/>
    <line x1="2" y1="17" x2="7" y2="17"/>
    <line x1="17" y1="7" x2="22" y2="7"/>
    <line x1="17" y1="17" x2="22" y2="17"/>
  </svg>

  <div class="wordmark">UpNext</div>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>
